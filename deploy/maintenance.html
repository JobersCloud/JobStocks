<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>En Mantenimiento</title>
    <meta http-equiv="refresh" content="10">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
        }
        .container {
            text-align: center;
            padding: 40px 30px;
            max-width: 520px;
        }
        .icon {
            font-size: 72px;
            margin-bottom: 24px;
            display: inline-block;
            animation: wrench 2.5s ease-in-out infinite;
        }
        @keyframes wrench {
            0%, 100% { transform: rotate(0deg); }
            20% { transform: rotate(-12deg); }
            40% { transform: rotate(12deg); }
            60% { transform: rotate(-8deg); }
            80% { transform: rotate(4deg); }
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 12px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        p {
            font-size: 1.05rem;
            opacity: 0.85;
            line-height: 1.7;
            margin-bottom: 32px;
        }
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 14px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .note {
            font-size: 0.8rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">&#128295;</div>
        <h1>En Mantenimiento</h1>
        <p>Estamos actualizando el sistema.<br>Volveremos en unos instantes.</p>
        <div class="spinner"></div>
        <div class="note">Esta p&aacute;gina se actualizar&aacute; autom&aacute;ticamente...</div>
    </div>
</body>
</html>
