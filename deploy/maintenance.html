<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema en Mantenimiento</title>
    <meta http-equiv="refresh" content="10">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f0f1a;
            color: #e8e8f0;
            overflow: hidden;
        }

        /* Fondo animado con gradientes */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(circle at 20% 50%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(236, 72, 153, 0.06) 0%, transparent 50%);
            animation: bgMove 20s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes bgMove {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-2%, -2%) rotate(3deg); }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 48px 36px;
            max-width: 480px;
            width: 90%;
        }

        /* Icono con anillo pulsante */
        .icon-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 32px;
        }

        .icon-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid rgba(59, 130, 246, 0.3);
            animation: pulse 2.5s ease-in-out infinite;
        }

        .icon-ring:nth-child(2) {
            width: 120px;
            height: 120px;
            border-color: rgba(139, 92, 246, 0.2);
            animation-delay: 0.5s;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            50% { transform: translate(-50%, -50%) scale(1.15); opacity: 0.2; }
        }

        .icon-gear {
            position: relative;
            width: 64px;
            height: 64px;
        }

        .icon-gear svg {
            width: 64px;
            height: 64px;
            fill: none;
            stroke: #8b9cf7;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            animation: gearSpin 8s linear infinite;
        }

        @keyframes gearSpin {
            to { transform: rotate(360deg); }
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #e8e8f0 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1rem;
            color: #9ca3af;
            line-height: 1.7;
            margin-bottom: 36px;
        }

        /* Barra de progreso animada */
        .progress-bar {
            width: 200px;
            height: 3px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 3px;
            margin: 0 auto 28px;
            overflow: hidden;
        }

        .progress-bar::after {
            content: '';
            display: block;
            width: 40%;
            height: 100%;
            background: linear-gradient(90deg, transparent, #6366f1, transparent);
            border-radius: 3px;
            animation: progressSlide 1.8s ease-in-out infinite;
        }

        @keyframes progressSlide {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(350%); }
        }

        /* Indicadores de estado */
        .status-dots {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-bottom: 28px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #6366f1;
            animation: dotBounce 1.4s ease-in-out infinite;
        }

        .status-dot:nth-child(2) { animation-delay: 0.2s; }
        .status-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotBounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        .status-text {
            font-size: 0.8rem;
            color: #6b7280;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .status-text .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #22c55e;
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Card sutil alrededor del contenido */
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 48px 36px;
            backdrop-filter: blur(10px);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container { padding: 24px 16px; }
            .card { padding: 36px 24px; }
            h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="icon-wrapper">
                <div class="icon-ring"></div>
                <div class="icon-ring"></div>
                <div class="icon-gear">
                    <svg viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                </div>
            </div>

            <h1>Sistema en Mantenimiento</h1>
            <p class="subtitle">
                Estamos aplicando mejoras al sistema.<br>
                Volveremos en breves instantes.
            </p>

            <div class="progress-bar"></div>

            <div class="status-dots">
                <div class="status-dot"></div>
                <div class="status-dot"></div>
                <div class="status-dot"></div>
            </div>

            <div class="status-text">
                <span class="dot"></span>
                Comprobando estado cada 10 segundos
            </div>
        </div>
    </div>
</body>
</html>
