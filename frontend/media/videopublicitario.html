<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="msapplication-navbutton-color" content="#000000">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>JobStocks - Vídeo Promocional</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; border: none; outline: none; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
            border: none;
            outline: none;
            transform: scale(1.02);
        }
        /* Móvil en vertical: rotar video 90° para forzar landscape */
        @media (orientation: portrait) and (max-width: 1024px) {
            video {
                position: fixed;
                top: 50%;
                left: 50%;
                width: 100vh;
                height: 100vw;
                transform: translate(-50%, -50%) rotate(90deg) scale(1.02);
                object-fit: cover;
            }
        }
    </style>
</head>
<body>
    <!-- Poster negro data-uri de 1px para ocultar primer fotograma con línea roja -->
    <video controls autoplay playsinline poster="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==">
        <source src="/media/videopublicitario.mp4" type="video/mp4">
    </video>
    <script>
        var video = document.querySelector('video');
        var doc = document.documentElement;

        function entrarFullscreen() {
            var el = doc;
            var rfs = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
            if (rfs) {
                rfs.call(el).then(function() {
                    if (screen.orientation && screen.orientation.lock) {
                        screen.orientation.lock('landscape').catch(function(){});
                    }
                }).catch(function(){});
            }
            if (video.webkitEnterFullscreen) {
                video.webkitEnterFullscreen();
            }
        }

        entrarFullscreen();
        document.addEventListener('click', entrarFullscreen, { once: true });
        document.addEventListener('touchstart', entrarFullscreen, { once: true });
        video.addEventListener('play', entrarFullscreen, { once: true });

        if (screen.orientation && screen.orientation.lock) {
            screen.orientation.lock('landscape').catch(function(){});
        }
    </script>
</body>
</html>
